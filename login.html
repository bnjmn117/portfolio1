<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | John Rey Santos Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <aside class="dashboard-sidebar">
            <div class="logo"><a href="index.html"><span class="logo-bracket">&lt;</span><span class="logo-text">CBR</span><span class="logo-bracket">/&gt;</span></a></div>
            <nav>
                <ul class="dashboard-nav">
                    <li><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a></li>
                </ul>
            </nav>
        </aside>
        <main class="dashboard-main">
            <div class="dashboard-content">
                <div class="dashboard-header">
                    <h1 class="dashboard-title">Login</h1>
                    <p class="dashboard-subtitle">Access your dashboard</p>
                </div>
                <div class="dashboard-card">
                    <form id="loginForm">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="loginEmail" placeholder="john@example.com" required>
                            <span class="error-message" id="loginEmailError"></span>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                            <span class="error-message" id="loginPasswordError"></span>
                        </div>
                        
                        <div class="form-options">
                            <label class="checkbox">
                                <input type="checkbox" id="rememberMe"> Remember me
                            </label>
                            <a href="#" class="forgot-password">Forgot password?</a>
                        </div>
                        
                        <div id="loginFeedback" class="form-feedback"></div>
                        
                        <button type="submit" class="btn-primary btn-block">Login <i class="fas fa-sign-in-alt"></i></button>
                    </form>
                    
                    <div class="demo-credentials">
                        <p><strong>Demo Credentials:</strong></p>
                        <p>Email: demo@portfolio.com | Password: demo123</p>
                        <p><small>(For demonstration purposes)</small></p>
                    </div>
                    
                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
